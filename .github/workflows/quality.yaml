name: Reusable Quality Gate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Go, frontend, and migrations
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: agartha_migration_test
          POSTGRES_USER: agartha
          POSTGRES_PASSWORD: agartha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agartha -d agartha_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm --dir web install --frozen-lockfile
      - name: Run frontend lint
        run: pnpm --dir web lint
      - name: Build frontend
        run: pnpm --dir web build
      - name: Generate API docs
        run: >-
          go run github.com/swaggo/swag/cmd/swag@v1.16.6 init
          -p snakecase --generatedTime --pd --pdl 3
          --exclude bin,web,.pnpm-store,node_modules,.github,docker-compose,.git,.vscode,.cache,extras
          --output server/docs/v1
      - name: Run Go tests
        run: go test ./...
      - name: Run Go vet
        run: go vet ./...
      - name: Run Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --build-tags=integration
      - name: Verify migration contracts
        env:
          AGARTHA_TEST_DATABASE_URL: postgres://agartha:agartha@localhost:5432/agartha_migration_test?sslmode=disable
        run: go test -tags=integration ./server/db -run '^TestSQLMigrationsSaltCacheCompatibility$' -count=1
