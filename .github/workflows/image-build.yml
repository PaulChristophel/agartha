name: Reusable Image Build

on:
  workflow_call:
    inputs:
      publish:
        description: Push successfully built images to Docker Hub
        required: false
        type: boolean
        default: false
    secrets:
      DOCKER_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  prepare:
    name: Load build matrix
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.matrix.outputs.image }}
      platform: ${{ steps.matrix.outputs.platform }}
      version: ${{ steps.matrix.outputs.version }}
      variants: ${{ steps.matrix.outputs.variants }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read image configuration
        id: matrix
        run: |
          echo "image=$(jq -r '.image' images.json)" >> "$GITHUB_OUTPUT"
          echo "platform=$(jq -r '.platform' images.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(<VERSION)" >> "$GITHUB_OUTPUT"
          echo "variants=$(jq -c '.variants' images.json)" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.variant.name }}
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(needs.prepare.outputs.variants) }}
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image }}
      PLATFORM: ${{ needs.prepare.outputs.platform }}
      IMAGE_VERSION: ${{ needs.prepare.outputs.version }}
      DOCKERFILE: ${{ matrix.variant.dockerfile }}
      TARGET: ${{ matrix.variant.target }}
      BUILD_ENV: ${{ matrix.variant.environment }}
      ROLLING_TAGS: ${{ toJSON(matrix.variant.rolling_tags) }}
      VERSION_SUFFIXES: ${{ toJSON(matrix.variant.version_suffixes) }}
      FLOATING_VERSION_TAGS: ${{ matrix.variant.floating_version_tags }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prepare build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA:0:12}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "PSEUDODATE=$(date -u '+%Y%m%d%H%M%S')" >> "$GITHUB_ENV"

      - name: Build image
        run: |
          version_prefix="${IMAGE_VERSION}-${PSEUDODATE}-${SHORT_SHA}"
          tags=()

          while IFS= read -r tag; do
            tags+=(--tag "${IMAGE_NAME}:${tag}")
          done < <(jq -r '.[]' <<< "$ROLLING_TAGS")

          while IFS= read -r suffix; do
            tags+=(--tag "${IMAGE_NAME}:${version_prefix}${suffix}")
          done < <(jq -r '.[]' <<< "$VERSION_SUFFIXES")

          if [[ "$FLOATING_VERSION_TAGS" == "true" ]]; then
            tags+=(
              --tag "${IMAGE_NAME}:${IMAGE_VERSION}-${PSEUDODATE}"
              --tag "${IMAGE_NAME}:${IMAGE_VERSION}"
            )
          fi

          podman build \
            --platform "$PLATFORM" \
            --file "$DOCKERFILE" \
            --target "$TARGET" \
            --build-arg "ENV=$BUILD_ENV" \
            --build-arg "SHORT_SHA=$SHORT_SHA" \
            --build-arg "GITHUB_SHA=$GITHUB_SHA" \
            --build-arg "GITHUB_DATE=$BUILD_DATE" \
            --build-arg "GITHUB_PSEUDODATE=$PSEUDODATE" \
            --build-arg "GITHUB_VERSION=$IMAGE_VERSION" \
            "${tags[@]}" \
            .

      - name: Log in to Docker Hub
        if: inputs.publish
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          printf '%s' "$DOCKER_PASSWORD" \
            | podman login docker.io --username pcm0 --password-stdin

      - name: Push image tags
        if: inputs.publish
        run: |
          version_prefix="${IMAGE_VERSION}-${PSEUDODATE}-${SHORT_SHA}"
          tags=()

          while IFS= read -r tag; do
            tags+=("$tag")
          done < <(jq -r '.[]' <<< "$ROLLING_TAGS")

          while IFS= read -r suffix; do
            tags+=("${version_prefix}${suffix}")
          done < <(jq -r '.[]' <<< "$VERSION_SUFFIXES")

          if [[ "$FLOATING_VERSION_TAGS" == "true" ]]; then
            tags+=(
              "${IMAGE_VERSION}-${PSEUDODATE}"
              "$IMAGE_VERSION"
            )
          fi

          for tag in "${tags[@]}"; do
            podman push "${IMAGE_NAME}:${tag}"
          done

      - name: Log out of Docker Hub
        if: ${{ always() && inputs.publish }}
        run: podman logout docker.io || true
